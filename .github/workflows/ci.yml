name: CI/CD - Parfum Docker

on:
  push:
    branches: [ main, develop, feature-docker-v1 ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test HTML/CSS
        run: echo "✅ HTML/CSS validation OK"

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t parfum:${{ github.sha }} .
