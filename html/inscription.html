<!-- Partie 2 : Formulaire – Informations personnelles -->
<section class="section-inscription">
    <h1>Créer mon compte</h1>
    <p class="texte-intro-inscription">
      Remplissez le formulaire pour rejoindre <strong>Parfum Shop</strong>.
    </p>

    <form id="form-inscription" onsubmit="return validerFormulaire()">
        <fieldset class="bloc-formulaire">
            <legend>Informations personnelles</legend>

            <label for="nom">Nom *</label>
            <input type="text" id="nom" name="nom">

            <label for="prenom">Prénom *</label>
            <input type="text" id="prenom" name="prenom">

            <label for="email">Email *</label>
            <input type="email" id="email" name="email">

            <label for="telephone">Téléphone</label>
            <input type="tel" id="telephone" name="telephone" placeholder="Ex : 22123456">

            <label for="adresse">Adresse *</label>
            <input type="text" id="adresse" name="adresse">
        </fieldset>
                <fieldset class="bloc-formulaire">
            <legend>Compte client</legend>

            <label for="pseudo">Nom d'utilisateur *</label>
            <input type="text" id="pseudo" name="pseudo">

            <label for="motdepasse">Mot de passe *</label>
            <input type="password" id="motdepasse" name="motdepasse">

            <label for="confirmation">Confirmer mot de passe *</label>
            <input type="password" id="confirmation" name="confirmation">
        </fieldset>

        <fieldset class="bloc-formulaire">
            <legend>Préférences parfum</legend>

            <label for="famille">Famille préférée</label>
            <select id="famille" name="famille">
                <option value="">-- Sélectionner --</option>
                <option value="floral">Floral</option>
                <option value="oriental">Oriental</option>
                <option value="boisé">Boisé</option>
                <option value="fruité">Fruité</option>
                <option value="frais">Frais / Agrumes</option>
            </select>

            <p class="texte-mini">Genre :</p>
            <label><input type="radio" name="genre" value="femme"> Femme</label>
            <label><input type="radio" name="genre" value="homme"> Homme</label>
            <label><input type="radio" name="genre" value="mixte"> Mixte</label>
        </fieldset>
